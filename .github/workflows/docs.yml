# `act push --list` validates this workflow locally. GitHub Pages OIDC and
# actions/deploy-pages cannot be exercised by act.
name: Documentation

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: conformance/package-lock.json

      - name: Install pinned upstream SDK
        working-directory: conformance
        run: npm ci

      - name: Build conformance runner
        run: zig build conformance-runner

      - name: Run differential conformance
        working-directory: conformance
        run: npm run conformance

      # Keep this release version in lockstep with scripts/build-book.sh.
      # The digest pins the official mdBook v0.5.2 Linux release binary.
      - name: Install mdBook 0.5.2
        shell: bash
        run: |
          set -euo pipefail
          version="0.5.2"
          archive="mdbook-v${version}-x86_64-unknown-linux-gnu.tar.gz"
          expected_sha256="084e4342ba564db270108763e404a7d1f309d932651a22484e93c0dc1a071f6d"
          download="$RUNNER_TEMP/$archive"
          install_dir="$RUNNER_TEMP/mdbook-$version"

          curl --proto '=https' --tlsv1.2 -fsSL \
            "https://github.com/rust-lang/mdBook/releases/download/v${version}/${archive}" \
            -o "$download"
          actual_sha256="$(sha256sum "$download" | cut -d' ' -f1)"
          if [[ "$actual_sha256" != "$expected_sha256" ]]; then
            echo "mdBook archive checksum mismatch" >&2
            exit 1
          fi

          mkdir -p "$install_dir"
          tar -xzf "$download" -C "$install_dir"
          test "$("$install_dir/mdbook" --version)" = "mdbook v${version}"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Build documentation
        run: bash scripts/build-book.sh

      - name: Verify syntax highlighting
        run: node scripts/check-book-highlight.mjs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
